[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1_000_000
# the following setting ensures that deterministically deployed contracts will always be to the same address
bytecode_hash = "none"
gas_reports = ["*"]
fuzz = { runs = 64 }
invariant = { runs = 64, depth = 32 }
auto_detect_solc = false
# Enable tests to read ir-optimized bytecode precompiled by profile.optimized
fs_permissions = [{ access = "read", path = "./optimized-out" }, { access = "read-write", path = "./deployments.json" }]

# for pre-compiling ir-optimized bytecode that will be later deployed by tests
[profile.optimized]
via_ir = true
out = "optimized-out"
script = "src"
bytecode_hash = "none"
sizes = true
# no need to compile tests with via-ir since they load optimized bytecode directly by default
test = "src"

# for deploying with via-ir optimization (scripts + src only, no tests)
# Lower optimizer_runs trades gas efficiency for smaller bytecode
[profile.deploy]
via_ir = true
optimizer_runs = 200
bytecode_hash = "none"
test = "src"

# for running tests against pre-compiled ir-optimized deployments
[profile.test]
src = "test"

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 100, depth = 100 }

[profile.lite]
fuzz = { runs = 32 }
invariant = { runs = 5, depth = 20 }

[profile.minimal]
fuzz = { runs = 1 }
invariant = { runs = 1, depth = 1 }

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "attributes_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 2
wrap_comments = true

[rpc_endpoints]
base = "http://localhost:8545" # managed by anvil-fork.sh
base-sepolia = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
local = "http://localhost:8545"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[etherscan]
base = { key = "${ETHERSCAN_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453" }
base-sepolia = { key = "${ETHERSCAN_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }
mainnet = { key = "${ETHERSCAN_KEY}", url = "https://api.etherscan.io/v2/api?chainid=1" }
sepolia = { key = "${ETHERSCAN_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11155111" }
